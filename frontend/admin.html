<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiberX Admin Panel</title>
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
<div class="sidebar">
    <h2>FiberX Admin</h2>
    <nav>
        <a href="#plans-section">Plans</a>
        <a href="#services-section">Services</a>
        <a href="#offers-section">Offers</a>
        <a href="#inquiries-section">Inquiries</a>
    </nav>
</div>

<div class="main">
    <div class="admin-header">
        <h1>Admin Panel</h1>
        <p>Manage pricing, services, plan features, and offers directly from this page.</p>
    </div>

    <section class="admin-section" id="plans-section">
        <h2>Plans</h2>
        <div id="plan-list"></div>
        <div class="form-panel">
            <h3>Add New Plan</h3>
            <form id="plan-add-form">
                <div class="form-row">
                    <label>Plan Name</label>
                    <input type="text" id="plan-name" required>
                </div>
                <div class="form-row">
                    <label>Price</label>
                    <input type="text" id="plan-price" placeholder="₹799" required>
                </div>
                <div class="form-row">
                    <label>Frequency</label>
                    <input type="text" id="plan-frequency" placeholder="/month" required>
                </div>
                <div class="form-row">
                    <label>Speed</label>
                    <input type="text" id="plan-speed" placeholder="100 Mbps" required>
                </div>
                <div class="form-row">
                    <label>Tag</label>
                    <input type="text" id="plan-tag" placeholder="Most Popular">
                </div>
                <div class="form-row">
                    <label>Features (comma separated)</label>
                    <input type="text" id="plan-features" placeholder="Unlimited Data, Free Router">
                </div>
                <button type="submit" class="btn">Create Plan</button>
                <p id="plan-add-status" class="status"></p>
            </form>
        </div>
    </section>

    <section class="admin-section" id="services-section">
        <h2>Services</h2>
        <div id="service-list"></div>
        <div class="form-panel">
            <h3>Add New Service</h3>
            <form id="service-add-form">
                <div class="form-row">
                    <label>Service Key</label>
                    <input type="text" id="service-key" placeholder="broadband" required>
                </div>
                <div class="form-row">
                    <label>Title</label>
                    <input type="text" id="service-title" required>
                </div>
                <div class="form-row">
                    <label>Subtitle</label>
                    <input type="text" id="service-subtitle" required>
                </div>
                <div class="form-row">
                    <label>Description</label>
                    <textarea id="service-description" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <label>Benefits</label>
                    <textarea id="service-benefits" rows="2"></textarea>
                </div>
                <div class="form-row">
                    <label>Features (comma separated)</label>
                    <input type="text" id="service-features">
                </div>
                <div class="form-row">
                    <label>Details (comma separated)</label>
                    <input type="text" id="service-details">
                </div>
                <button type="submit" class="btn">Create Service</button>
                <p id="service-add-status" class="status"></p>
            </form>
        </div>
    </section>

    <section class="admin-section" id="offers-section">
        <h2>Offers</h2>
        <div id="offer-list"></div>
        <div class="form-panel">
            <h3>Add New Offer</h3>
            <form id="offer-add-form">
                <div class="form-row">
                    <label>Offer Name</label>
                    <input type="text" id="offer-name" required>
                </div>
                <div class="form-row">
                    <label>Offer Type</label>
                    <input type="text" id="offer-type" placeholder="Discount, Promotion">
                </div>
                <div class="form-row">
                    <label>Discount</label>
                    <input type="text" id="offer-discount" placeholder="10% off">
                </div>
                <div class="form-row">
                    <label>Details</label>
                    <textarea id="offer-details" rows="2"></textarea>
                </div>
                <div class="form-row checkbox-row">
                    <label><input type="checkbox" id="offer-active" checked> Active</label>
                </div>
                <button type="submit" class="btn">Create Offer</button>
                <p id="offer-add-status" class="status"></p>
            </form>
        </div>
    </section>

    <section class="admin-section" id="inquiries-section">
        <h2>Contact & Feasibility Requests</h2>
        <div id="inquiry-list"></div>
    </section>
</div>

<script src="js/admin.js"></script>
</body>
</html>
