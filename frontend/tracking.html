<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order - FiberX Broadband</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/tracking.css">
</head>
<body data-page="tracking">
  <header id="site-header" class="header"></header>

  <section class="hero-small">
    <h1>Track Your Connection</h1>
    <p>Check the status of your FiberX installation</p>
  </section>

  <div class="container">
    <section class="tracking-section">
      <div class="tracking-wrapper">
        <div class="tracking-search">
          <h2>Enter Your Details</h2>
          <p>Use your phone number or email to track your order</p>

          <form id="trackingForm" class="tracking-form">
            <div class="form-group">
              <label for="trackPhone">Phone Number</label>
              <input type="tel" id="trackPhone" placeholder="10-digit phone number">
            </div>
            <div class="form-divider">OR</div>
            <div class="form-group">
              <label for="trackEmail">Email Address</label>
              <input type="email" id="trackEmail" placeholder="your@email.com">
            </div>
            <button type="submit" class="btn-primary">Track Order</button>
          </form>
        </div>

        <div id="trackingResult" class="tracking-result hidden"></div>
      </div>
    </section>
  </div>

  <footer id="site-footer"></footer>

  <script src="js/app.js"></script>
  <script src="js/tracking.js"></script>
</body>
</html>
